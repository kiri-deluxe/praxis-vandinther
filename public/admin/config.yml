backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "opening-hours"
    label: "Sprechzeiten"
    files:
      - label: "Sprechzeiten"
        name: "opening-hours"
        file: "content/opening-hours.json"
        fields:
          - label: "Termin-Sprechstunde"
            name: "termin"
            widget: "list"
            fields:
              - { label: "Tage", name: "days", widget: "string" }
              - { label: "Uhrzeiten", name: "hours", widget: "string" }
          - label: "Ohne Termin"
            name: "ohneTermin"
            widget: "list"
            fields:
              - { label: "Tage", name: "days", widget: "string" }
              - { label: "Uhrzeiten", name: "hours", widget: "string" }
          - label: "Infekt-Sprechstunde"
            name: "infekt"
            widget: "list"
            fields:
              - { label: "Tage", name: "days", widget: "string" }
              - { label: "Uhrzeiten", name: "hours", widget: "string" }
              - { label: "Hinweis", name: "note", widget: "string", required: false }

  - name: "holidays"
    label: "Betriebsferien"
    files:
      - label: "Betriebsferien"
        name: "holidays"
        file: "content/holidays.json"
        fields:
          - { label: "Jahr", name: "year", widget: "number" }
          - label: "Zeiträume"
            name: "periods"
            widget: "list"
            fields:
              - { label: "Datum / Zeitraum", name: "label", widget: "string" }

  - name: "notices"
    label: "Aktuelles / Hinweise"
    files:
      - label: "Hinweise"
        name: "notices"
        file: "content/notices.json"
        fields:
          - label: "Hinweise"
            name: "notices"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }

  - name: "documents"
    label: "Dokumente für Studierende"
    files:
      - label: "Dokumente"
        name: "documents"
        file: "content/documents.json"
        fields:
          - label: "Dokumente"
            name: "documents"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - { label: "PDF-Datei", name: "file", widget: "file", media_folder: "/public/docs", public_folder: "/docs" }
